<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>낙상 감지 서버 대시보드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: #1e2130;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a2d3e;
        }
        .card h3 {
            font-size: 13px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .card .value {
            font-size: 36px;
            font-weight: bold;
            color: #00d4ff;
        }
        .card .value.danger { color: #ff4d4d; }
        .card .value.success { color: #00ff99; }
        .card .value.warning { color: #ffaa00; }

        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .dot-on { background: #00ff99; box-shadow: 0 0 8px #00ff99; }
        .dot-off { background: #ff4d4d; }

        .table-card {
            background: #1e2130;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2d3e;
        }
        .table-card h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            color: #888;
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #2a2d3e;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #1a1d2e;
        }
        .fall-alert {
            display: none;
            background: #ff4d4d22;
            border: 1px solid #ff4d4d;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
            font-size: 20px;
            color: #ff4d4d;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🛡️ 낙상 감지 서버 대시보드</h1>

    <div class="fall-alert" id="fallAlert">
        ⚠️ 낙상 감지됨! 보호자에게 알림 발송 완료
    </div>

    <div class="grid">
        <div class="card">
            <h3>RPi4 연결 상태</h3>
            <div class="value" id="rpi4Status">
                <span class="status-dot dot-off" id="rpi4Dot"></span>미연결
            </div>
        </div>
        <div class="card">
            <h3>총 페어링 수</h3>
            <div class="value success" id="pairCount">0</div>
        </div>
        <div class="card">
            <h3>낙상 감지 횟수</h3>
            <div class="value danger" id="fallCount">0</div>
        </div>
    </div>

    <div class="table-card">
        <h3>최근 페어링 기록</h3>
        <table>
            <thead>
                <tr>
                    <th>시간</th>
                    <th>SEQ</th>
                    <th>RX1 RSSI</th>
                    <th>RX2 RSSI</th>
                </tr>
            </thead>
            <tbody id="pairTable">
            </tbody>
        </table>
    </div>

    <script>
        const socket = io();

        // 초기 상태 불러오기
        fetch('/status')
            .then(res => res.json())
            .then(data => {
                document.getElementById('pairCount').textContent = data.pair_count;
                document.getElementById('fallCount').textContent = data.fall_count;
                updateRpi4Status(data.rpi4_connected);
                data.recent_pairs.forEach(addPairRow);
            });

        // 페어링 업데이트
        socket.on('pair_update', (data) => {
            document.getElementById('pairCount').textContent =
                parseInt(document.getElementById('pairCount').textContent) + 1;
            addPairRow(data);
        });

        // 낙상 감지
        socket.on('fall_detected', (data) => {
            document.getElementById('fallCount').textContent = data.fall_count;
            const alert = document.getElementById('fallAlert');
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 5000);
        });

        // RPi4 상태
        socket.on('rpi4_status', (data) => {
            updateRpi4Status(data.connected);
        });

        function updateRpi4Status(connected) {
            const dot = document.getElementById('rpi4Dot');
            const text = document.getElementById('rpi4Status');
            if (connected) {
                dot.className = 'status-dot dot-on';
                text.innerHTML = '<span class="status-dot dot-on"></span>연결됨';
            } else {
                dot.className = 'status-dot dot-off';
                text.innerHTML = '<span class="status-dot dot-off"></span>미연결';
            }
        }

        function addPairRow(data) {
            const tbody = document.getElementById('pairTable');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${data.time}</td>
                <td>${data.seq}</td>
                <td>${data.rx1_rssi} dBm</td>
                <td>${data.rx2_rssi} dBm</td>
            `;
            tbody.insertBefore(row, tbody.firstChild);
            if (tbody.children.length > 10) tbody.removeChild(tbody.lastChild);
        }
    </script>
</body>
</html>
